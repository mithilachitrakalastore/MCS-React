
<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mithila Chitrakala - Premium Traditional Art</title>
    <link rel="icon" href="https://res.cloudinary.com/djmbuuz28/image/upload/v1761108817/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700;800&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --brand-red: #5c1111; 
            --brand-red-light: #7a1818;
            --brand-saffron: #b36b00;
            --brand-stone: #2a2723;
            --brand-paper: #efece6; /* Softened off-white/parchment */
            --brand-card: #f8f6f2; /* Subtle contrast for cards */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--brand-paper);
            color: var(--brand-stone);
            scroll-behavior: smooth;
        }

        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-dancing { font-family: 'Dancing Script', cursive; }

        .glass-nav {
            background: rgba(239, 236, 230, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }

        .mithila-card-shadow {
            box-shadow: 0 12px 40px -15px rgba(42, 39, 35, 0.08);
        }

        .premium-shadow {
            box-shadow: 0 4px 20px -5px rgba(92, 17, 17, 0.12);
        }

        @keyframes subtle-float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0); }
        }
        .animate-subtle-float { animation: subtle-float 6s ease-in-out infinite; }

        @keyframes feedback-bounce {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(1.05); }
            50% { transform: scale(0.98); }
            70% { transform: scale(1.02); }
        }
        .animate-feedback-bounce { animation: feedback-bounce 0.5s cubic-bezier(0.36, 0, 0.66, -0.56); }

        /* Custom Scrollbar - Muted */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--brand-paper); }
        ::-webkit-scrollbar-thumb { 
            background: #d1cdc7; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--brand-red); }

        .form-input {
            background-color: #e9e5de;
            border: 1px solid #ddd9d0;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            border-color: var(--brand-red);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(92, 17, 17, 0.04);
        }

        .heritage-border {
            position: relative;
        }
        .heritage-border::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 2px;
            background: var(--brand-red);
        }

        @media print {
            /* Set page margins for print */
            @page {
                margin: 0.5in;
                size: auto;
            }
            
            /* Hide everything by default except invoice */
            body {
                visibility: hidden;
            }
            
            /* Show only the printable invoice container */
            .print\:invoice-container,
            .print\:invoice-container * {
                visibility: visible !important;
            }
            
            /* Absolute positioning to prevent empty space from affecting layout */
            .print\:invoice-container {
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                height: auto !important;
                max-height: none !important;
                overflow: visible !important;
                background: white !important;
                z-index: 9999 !important;
                visibility: visible !important;
                display: block !important;
            }
            
            /* Remove fixed positioning from inner container */
            .print\:invoice-container > div:first-child {
                position: static !important;
                max-height: none !important;
                overflow: visible !important;
                border-radius: 0 !important;
                box-shadow: none !important;
                width: 100% !important;
            }

            /* Prevent App container from forcing height */
            #root, .min-h-screen {
                min-height: 0 !important;
            }
            
            /* Hide non-printable elements */
            .print\:hidden {
                display: none !important;
            }
            
            /* Reset print container styles */
            .print\:invoice-container .print\:shadow-none {
                box-shadow: none !important;
            }
            
            /* Allow page breaks */
            .print\:invoice-container {
                page-break-after: auto;
                page-break-before: auto;
            }
            
            /* Prevent breaks inside table rows */
            .print\:invoice-container table tr {
                page-break-inside: avoid;
            }
            
            /* Prevent breaks inside main sections */
            .print\:invoice-container > div > div {
                page-break-inside: avoid;
            }
        }
    </style>
